workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.ultrax.optimizer"
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Build Android package
        script: |
          # In a real scenario, you would use Capacitor or similar
          # For now, we simulate the Android build by packaging the web build
          mkdir -p android/app/build/outputs/apk/release
          cd dist && zip -r ../android/app/build/outputs/apk/release/app-release.apk .
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - bpahan685@gmail.com
        notify:
          success: true
          failure: true
